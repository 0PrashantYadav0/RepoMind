# RepoMind configuration. Copy to config.yaml and edit.
# Nothing operational is hard-coded; secrets come from the environment.

repo:
  name: "owner/name"            # GitHub repo (for the GitHub API + IDs)
  local_path: "/path/to/clone"  # local git clone (for GitSource history)
  github_token_env: "GITHUB_TOKEN"  # env var holding the PAT

memory:
  # "memory"        - default, offline, deterministic (no AI deps, no network)
  # "cognee"        - in-process Cognee SDK (local LLM/embeddings via Ollama)
  # "cognee_cloud"  - hosted Cognee (NOTHING to self-host: just a key + URL)
  backend: "memory"
  persist_path: "graph.json"    # JSON snapshot of the structural graph
  cognee_api_key_env: "COGNEE_API_KEY"
  dataset: "repomind"
  # --- Cognee Cloud (backend: "cognee_cloud") -- hosted, managed. Only these
  #     two values are needed; everything runs server-side. The URL is not a
  #     secret (set here or via COGNEE_SERVICE_URL); the key comes from env.
  service_url: ""               # e.g. "https://<your-instance>.cognee.ai"
  service_url_env: "COGNEE_SERVICE_URL"
  cloud_search_type: "CHUNKS"  # seed-retrieval type for cloud recall
  # --- Local / self-hosted Cognee (Ollama + embedded kuzu). Used when
  #     backend: "cognee" and these are set. Leave empty for Cognee Cloud.
  #     (persist_path above is required so the structural graph survives between
  #      the backfill process and later ask/serve processes.)
  llm_provider: "ollama"
  llm_model: "llama3.2:3b"
  llm_endpoint: "http://localhost:11434/v1"
  embedding_provider: "ollama"
  embedding_model: "nomic-embed-text"
  embedding_endpoint: "http://localhost:11434/api/embed"  # note: /api/embed, not /api/embeddings
  embedding_dimensions: 768
  graph_provider: "kuzu"        # embedded, local (no server)
  huggingface_tokenizer: "bert-base-uncased"  # token-counting tokenizer (cached once)
  access_control: false         # required for the local single-tenant kuzu graph

state:
  db_path: "repomind_state.sqlite3"

ingest:
  verify_after: true
  batch_size: 50
  max_retries: 5
  retry_backoff: "exponential"
  # Bounding knobs for large repos (0 = unlimited). Handy for demos and to stay
  # within GitHub API rate limits; raise/remove for a complete ingest.
  max_commits: 0                # cap git history commits walked per backfill/sync
  max_prs: 0                    # cap pull requests fetched from GitHub
  max_issues: 0                 # cap issues fetched from GitHub

webhook:
  enabled: true                 # primary real-time path
  secret_env: "REPOMIND_WEBHOOK_SECRET"
  require_signature: true       # fail-closed: reject unsigned webhooks (SEC-1)

api:
  # MANDATORY API-key auth for every endpoint except /livez. The server fails
  # closed: with no active keys, protected endpoints return 503. Clients pass
  # X-API-Key or Authorization: Bearer <token>. /webhook is exempt (GitHub HMAC).
  #
  # token_env: legacy single token -> becomes an admin key named "default".
  token_env: "REPOMIND_API_TOKEN"
  #
  # keys: per-client named keys with scopes (read < write < admin). Each key's
  # secret is read from its own env var (token_env); unset env -> key inactive.
  keys:
    - name: ci-bot
      token_env: REPOMIND_KEY_CI
      scopes: [write]
    - name: dashboard
      token_env: REPOMIND_KEY_DASHBOARD
      scopes: [read]
    - name: ops
      token_env: REPOMIND_KEY_OPS
      scopes: [admin]
  #
  # Per-key rate limit: max `rate_limit` requests per `rate_window`. 0 disables.
  rate_limit: 0
  rate_window: "1m"

polling:
  enabled: false                # OPTIONAL - off by default; opt in here
  interval: "15m"               # only used when enabled; fully configurable
  scope: ["prs", "issues", "commits"]

sync:
  default_mode: "incremental"   # manual sync default; "full" available on demand

verification:
  schedule: "0 3 * * *"         # nightly deep reconcile (cron)
